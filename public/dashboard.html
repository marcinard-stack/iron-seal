<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Seal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, system-ui, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: #2d2b35; background: #f4f3ee; line-height: 1.6;
        }

        /* ---- TOP BAR ---- */
        .topbar {
            position: fixed; top: 0; left: 0; right: 0; height: 56px;
            background: white; border-bottom: 1px solid #e8e6e0;
            z-index: 300; display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px; overflow: hidden;
        }
        .topbar-left { display: flex; align-items: center; gap: 8px; }
        .topbar-btn {
            background: none; border: none; cursor: pointer; padding: 8px;
            border-radius: 6px; color: #6b6560; display: flex; align-items: center;
            justify-content: center; transition: all 0.15s;
        }
        .topbar-btn:hover { background: #edecea; color: #2d2b35; }
        .topbar-btn svg { width: 18px; height: 18px; }
        .topbar-title { font-size: 13px; font-weight: 500; color: #6b6560; margin-left: 4px; }

        /* ---- LEFT SIDEBAR ---- */
        .left-sidebar {
            position: fixed; left: 0; top: 56px; bottom: 0; width: 260px;
            background: #2d2b35; z-index: 250; display: flex; flex-direction: column;
            transform: translateX(-260px); transition: transform 0.25s ease;
        }
        .left-sidebar.open { transform: translateX(0); }
        .left-sidebar-content { flex: 1; padding: 12px; overflow-y: auto; }
        .left-sidebar-content::-webkit-scrollbar { width: 4px; }
        .left-sidebar-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

        .sidebar-cta {
            display: flex; align-items: center; gap: 8px; width: 100%;
            padding: 10px 12px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; color: #e8e6e0; font-size: 13px; font-weight: 500;
            cursor: pointer; transition: all 0.15s; margin-bottom: 16px;
        }
        .sidebar-cta:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.15); }
        .sidebar-cta svg { width: 16px; height: 16px; flex-shrink: 0; }

        .sidebar-section { margin-bottom: 8px; }
        .sidebar-section-title {
            font-size: 11px; font-weight: 600; color: #8a8780;
            text-transform: uppercase; letter-spacing: 0.8px;
            padding: 8px 12px 6px; user-select: none;
        }
        .sidebar-item {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 12px; border-radius: 6px; color: #b1ada1;
            font-size: 13px; cursor: pointer; transition: all 0.15s;
            text-decoration: none;
        }
        .sidebar-item:hover { background: rgba(255,255,255,0.06); color: #e8e6e0; }
        .sidebar-item.active { background: rgba(255,255,255,0.1); color: #e8e6e0; }
        .sidebar-item svg { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.6; }
        .sidebar-item .item-count {
            margin-left: auto; font-size: 11px; color: #6b6560;
            background: rgba(255,255,255,0.06); padding: 1px 6px; border-radius: 10px;
        }

        .left-sidebar-user {
            padding: 12px; border-top: 1px solid rgba(255,255,255,0.08);
            display: flex; align-items: center; gap: 10px; cursor: pointer;
            transition: background 0.15s;
        }
        .left-sidebar-user:hover { background: rgba(255,255,255,0.05); }
        .left-sidebar-user .avatar {
            width: 32px; height: 32px; border-radius: 50%;
            background: #c15f3c; color: white; font-size: 12px; font-weight: 600;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .left-sidebar-user .user-info { flex: 1; min-width: 0; }
        .left-sidebar-user .user-name { font-size: 13px; font-weight: 500; color: #e8e6e0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .left-sidebar-user .user-plan { font-size: 11px; color: #8a8780; }
        .left-sidebar-user .settings-icon { color: #6b6560; flex-shrink: 0; }
        .left-sidebar-user:hover .settings-icon { color: #b1ada1; }
        .left-sidebar-user .settings-icon svg { width: 16px; height: 16px; }

        .left-overlay {
            position: fixed; top: 56px; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3); z-index: 240; display: none;
        }
        .left-overlay.show { display: block; }

        /* ---- MAIN CONTENT ---- */
        .main-content {
            padding: 76px 36px 36px; max-width: 1100px; margin: 0 auto;
        }
        .page-header {
            margin-bottom: 28px;
        }
        .page-header h1 {
            font-size: 22px; font-weight: 700; color: #2d2b35; margin-bottom: 4px;
        }
        .page-header p { font-size: 13px; color: #8a8780; }

        .project-grid { display: flex; flex-direction: column; gap: 12px; }

        .project-card {
            background: white; border: 1px solid #e8e6e0; border-radius: 10px;
            padding: 20px 24px; display: flex; align-items: center; gap: 16px;
            cursor: pointer; transition: all 0.2s; text-decoration: none; color: inherit;
        }
        .project-card:hover { border-color: #c15f3c; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .project-card .project-icon {
            width: 40px; height: 40px; border-radius: 8px; background: #f4f3ee;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .project-card .project-icon svg { width: 20px; height: 20px; color: #b1ada1; }
        .project-card .project-info { flex: 1; min-width: 0; }
        .project-card .project-title {
            font-size: 14px; font-weight: 600; color: #2d2b35;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .project-card .project-meta { font-size: 12px; color: #8a8780; margin-top: 2px; }
        .project-card .project-status {
            font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 12px;
            text-transform: uppercase; letter-spacing: 0.3px; flex-shrink: 0;
        }
        .project-card .project-status.draft { background: #fef3c7; color: #92400e; }
        .project-card .project-status.proposed { background: #dbeafe; color: #1e40af; }
        .project-card .project-status.signed { background: #dcfce7; color: #166534; }
        .project-card .project-status.active { background: #dcfce7; color: #166534; }
        .project-card .project-status.delivered { background: #f3e8ff; color: #6b21a8; }
        .project-card .project-status.completed { background: #f4f3ee; color: #4a4850; }
        .project-card .project-status.lost { background: #f4f3ee; color: #8a8780; }

        .filter-bar { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
        .filter-tag {
            font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 12px;
            border: 1px solid #e8e6e0; background: white; color: #6b6560;
            cursor: pointer; transition: all 0.15s; user-select: none;
        }
        .filter-tag:hover { border-color: #c15f3c; color: #c15f3c; }
        .filter-tag.active { background: #2d2b35; color: white; border-color: #2d2b35; }
        .project-card .project-comments {
            font-size: 12px; color: #8a8780; display: flex; align-items: center; gap: 4px; flex-shrink: 0;
        }
        .project-card .project-comments svg { width: 14px; height: 14px; }

        .empty-state {
            text-align: center; padding: 60px 20px; color: #8a8780;
        }
        .empty-state p { font-size: 14px; margin-bottom: 16px; }
        .empty-state .create-btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 10px 20px; background: #2d2b35; color: white;
            border: none; border-radius: 8px; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: background 0.15s;
        }
        .empty-state .create-btn:hover { background: #3d3b45; }

        /* ---- CREATE MODAL ---- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4); z-index: 500; display: none;
            align-items: center; justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: white; border-radius: 10px; padding: 24px 28px;
            width: 420px; max-width: 90vw; box-shadow: 0 16px 48px rgba(0,0,0,0.15);
        }
        .modal h3 { font-size: 16px; font-weight: 700; color: #2d2b35; margin-bottom: 14px; }
        .modal input {
            width: 100%; padding: 10px 14px; border: 1px solid #e8e6e0; border-radius: 8px;
            font-size: 14px; font-family: inherit; color: #2d2b35; outline: none;
        }
        .modal input:focus { border-color: #c15f3c; box-shadow: 0 0 0 2px rgba(193,95,60,0.15); }
        .modal .modal-actions {
            display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px;
        }
        .modal .btn-cancel {
            padding: 8px 16px; background: none; border: 1px solid #e8e6e0;
            border-radius: 8px; font-size: 13px; color: #6b6560; cursor: pointer;
            transition: all 0.15s;
        }
        .modal .btn-cancel:hover { background: #f4f3ee; }
        .modal .btn-create {
            padding: 8px 20px; background: #2d2b35; border: none;
            border-radius: 8px; font-size: 13px; font-weight: 600; color: white;
            cursor: pointer; transition: background 0.15s;
        }
        .modal .btn-create:hover { background: #3d3b45; }
        .modal .btn-create:disabled { opacity: 0.4; cursor: default; }

        /* ---- MOBILE RESPONSIVE ---- */
        @media (max-width: 768px) {
            .main-content { padding: 60px 16px 16px; }
            .page-header h1 { font-size: 18px; }
            .page-header p { font-size: 12px; }
            .project-card { padding: 14px 16px; flex-wrap: wrap; gap: 10px; }
            .project-card .project-info { min-width: 0; flex-basis: calc(100% - 56px); }
            .project-card .project-status { font-size: 10px; }
            .project-card .project-comments { font-size: 11px; }
            .filter-bar { gap: 4px; }
            .filter-tag { font-size: 10px; padding: 3px 8px; }
            .modal { width: 95vw; padding: 20px; }
            .empty-state { padding: 40px 16px; }
        }
    </style>
</head>
<body>

<script>
(function() {
    var dfToken = localStorage.getItem('df_token');
    if (!dfToken) { window.location.href = '/login'; return; }
    var authHeaders = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + dfToken };

    // Populate sidebar user
    var dfUser = null;
    try { dfUser = JSON.parse(localStorage.getItem('df_user')); } catch(e) {}
    if (dfUser) {
        var initials = dfUser.name ? dfUser.name.split(' ').map(function(w) { return w[0]; }).join('').toUpperCase().substring(0,2) : '?';
        document.getElementById('sidebarAvatar').textContent = initials;
        document.getElementById('sidebarUserName').textContent = dfUser.name || 'Utilisateur';
    }

    // Sidebar user menu toggle
    document.getElementById('sidebarUserToggle').addEventListener('click', function() {
        var menu = document.getElementById('sidebarUserMenu');
        var arrow = this.querySelector('.settings-icon');
        if (menu.style.display === 'none') {
            menu.style.display = 'block';
            arrow.style.transform = 'rotate(180deg)';
        } else {
            menu.style.display = 'none';
            arrow.style.transform = '';
        }
    });
    // Populate email
    if (dfUser) document.getElementById('sidebarUserEmail').textContent = dfUser.email || '';
    // Logout
    document.getElementById('sidebarLogout').addEventListener('click', function(e) {
        e.preventDefault();
        fetch('/api/auth?action=logout', { method: 'POST', headers: { 'Authorization': 'Bearer ' + localStorage.getItem('df_token') } })
            .finally(function() { localStorage.removeItem('df_token'); localStorage.removeItem('df_user'); window.location.href = '/login'; });
    });

    var path = window.location.pathname.replace(/\/$/, '');
    var currentTab = 'draft';
    if (path === '/deals/proposed') currentTab = 'proposed';
    else if (path === '/deals/active') currentTab = 'active';
    else if (path === '/deals/completed') currentTab = 'completed';

    // Tab config: which statuses belong to each tab, display info, sub-filters
    var TABS = {
        draft: {
            title: 'Brouillons', subtitle: 'Projets en cours de rédaction',
            statuses: ['draft'], filters: []
        },
        proposed: {
            title: 'Proposés', subtitle: 'Devis envoyés en attente de réponse',
            statuses: ['proposed'], filters: []
        },
        active: {
            title: 'En cours', subtitle: 'Projets signés ou en exécution',
            statuses: ['signed', 'active', 'delivered'],
            filters: [
                { value: 'all', label: 'Tous' },
                { value: 'signed', label: 'Signé' },
                { value: 'active', label: 'En exécution' },
                { value: 'delivered', label: 'Livré' }
            ]
        },
        completed: {
            title: 'Terminés', subtitle: 'Projets complétés ou perdus',
            statuses: ['completed', 'lost'],
            filters: [
                { value: 'all', label: 'Tous' },
                { value: 'completed', label: 'Complété' },
                { value: 'lost', label: 'Perdu' }
            ]
        }
    };

    var STATUS_LABELS = {
        draft: 'Brouillon', proposed: 'Proposé', signed: 'Signé',
        active: 'En exécution', delivered: 'Livré', completed: 'Complété', lost: 'Perdu'
    };

    var tab = TABS[currentTab];
    document.getElementById('pageTitle').textContent = tab.title;
    document.getElementById('pageSubtitle').textContent = tab.subtitle;

    // Highlight sidebar
    document.querySelectorAll('.sidebar-item').forEach(function(el) {
        if (el.dataset.tab === currentTab) el.classList.add('active');
    });

    // Sub-filters
    var activeFilter = 'all';
    var filterBar = document.getElementById('filterBar');
    if (tab.filters.length) {
        tab.filters.forEach(function(f) {
            var tag = document.createElement('span');
            tag.className = 'filter-tag' + (f.value === 'all' ? ' active' : '');
            tag.textContent = f.label;
            tag.dataset.filter = f.value;
            tag.addEventListener('click', function() {
                activeFilter = f.value;
                filterBar.querySelectorAll('.filter-tag').forEach(function(t) { t.classList.remove('active'); });
                tag.classList.add('active');
                renderProjects();
            });
            filterBar.appendChild(tag);
        });
    }

    // Sidebar toggle
    var sidebar = document.getElementById('leftSidebar');
    var overlay = document.getElementById('leftOverlay');
    document.getElementById('leftToggle').addEventListener('click', function() {
        sidebar.classList.toggle('open'); overlay.classList.toggle('show');
    });
    overlay.addEventListener('click', function() {
        sidebar.classList.remove('open'); overlay.classList.remove('show');
    });

    // Verify session is valid
    fetch('/api/auth?action=me', { headers: authHeaders })
        .then(function(r) { if (!r.ok) throw new Error(); return r.json(); })
        .then(function(data) {
            localStorage.setItem('df_user', JSON.stringify(data.user));
            var initials = data.user.name ? data.user.name.split(' ').map(function(w) { return w[0]; }).join('').toUpperCase().substring(0,2) : '?';
            document.getElementById('sidebarAvatar').textContent = initials;
            document.getElementById('sidebarUserName').textContent = data.user.name;
        })
        .catch(function() {
            localStorage.removeItem('df_token');
            localStorage.removeItem('df_user');
            window.location.href = '/login';
            return;
        });

    // Load all projects once, then filter locally
    var allProjects = [];
    var grid = document.getElementById('projectGrid');

    fetch('/api/projects', { headers: authHeaders }).then(function(r) { return r.json(); }).then(function(projects) {
        allProjects = projects;
        updateCounts();
        renderProjects();
    }).catch(function() {
        grid.innerHTML = '<div class="empty-state"><p>Erreur de chargement</p></div>';
    });

    function updateCounts() {
        var counts = { draft: 0, proposed: 0, active: 0, completed: 0 };
        allProjects.forEach(function(p) {
            if (p.status === 'draft') counts.draft++;
            else if (p.status === 'proposed') counts.proposed++;
            else if (p.status === 'signed' || p.status === 'active' || p.status === 'delivered') counts.active++;
            else if (p.status === 'completed' || p.status === 'lost') counts.completed++;
        });
        document.getElementById('countDraft').textContent = counts.draft;
        document.getElementById('countProposed').textContent = counts.proposed;
        document.getElementById('countActive').textContent = counts.active;
        document.getElementById('countCompleted').textContent = counts.completed;
    }

    function renderProjects() {
        var filtered = allProjects.filter(function(p) {
            if (tab.statuses.indexOf(p.status) === -1) return false;
            if (activeFilter !== 'all' && p.status !== activeFilter) return false;
            return true;
        });

        grid.innerHTML = '';
        if (!filtered.length) {
            grid.innerHTML = '<div class="empty-state"><p>Aucun projet pour le moment</p>'
                + (currentTab === 'draft' ? '<button class="create-btn" onclick="document.getElementById(\'modalOverlay\').classList.add(\'show\'); document.getElementById(\'projectTitleInput\').focus();">'
                + '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="8" y1="3" x2="8" y2="13"/><line x1="3" y1="8" x2="13" y2="8"/></svg>'
                + 'Créer un projet</button>' : '') + '</div>';
            return;
        }

        filtered.forEach(function(p) {
            var card = document.createElement('a');
            card.className = 'project-card';
            card.href = '/deals/' + p.status + '/' + p.slug;

            var date = new Date(p.updated_at);
            var dateStr = date.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: 'numeric' });
            var statusLabel = STATUS_LABELS[p.status] || p.status;

            card.innerHTML = '<div class="project-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="2" width="14" height="16" rx="2"/><line x1="6" y1="6" x2="14" y2="6"/><line x1="6" y1="9.5" x2="14" y2="9.5"/><line x1="6" y1="13" x2="11" y2="13"/></svg></div>'
                + '<div class="project-info"><div class="project-title">' + escHtml(p.title) + '</div>'
                + '<div class="project-meta">Mis à jour le ' + dateStr + '</div></div>'
                + '<span class="project-status ' + p.status + '">' + statusLabel + '</span>'
                + '<span class="project-comments" data-slug="' + p.slug + '"><svg viewBox="0 0 16 14" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="1" y="1" width="14" height="9" rx="2"/><polygon points="4,10 7,13 10,10"/></svg><span>\u2014</span></span>';
            grid.appendChild(card);

            fetch('/api/comments?doc=' + encodeURIComponent(p.slug)).then(function(r) { return r.json(); }).then(function(comments) {
                var el = card.querySelector('.project-comments span');
                if (el) el.textContent = comments.filter(function(c) { return c.text; }).length;
            }).catch(function() {});
        });
    }

    // Create modal
    var modalOverlay = document.getElementById('modalOverlay');
    var titleInput = document.getElementById('projectTitleInput');
    var createBtn = document.getElementById('modalCreate');

    document.getElementById('createProjectBtn').addEventListener('click', function() {
        modalOverlay.classList.add('show');
        setTimeout(function() { titleInput.focus(); }, 100);
    });
    document.getElementById('modalCancel').addEventListener('click', function() {
        modalOverlay.classList.remove('show'); titleInput.value = '';
    });
    modalOverlay.addEventListener('click', function(e) {
        if (e.target === modalOverlay) { modalOverlay.classList.remove('show'); titleInput.value = ''; }
    });
    titleInput.addEventListener('input', function() {
        createBtn.disabled = !titleInput.value.trim();
    });
    titleInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && titleInput.value.trim()) createBtn.click();
    });
    createBtn.addEventListener('click', function() {
        var title = titleInput.value.trim();
        if (!title) return;
        createBtn.disabled = true; createBtn.textContent = '...';
        fetch('/api/projects', {
            method: 'POST',
            headers: authHeaders,
            body: JSON.stringify({ title: title })
        }).then(function(r) { return r.json(); }).then(function(p) {
            window.location.href = '/deals/draft/' + p.slug;
        }).catch(function() {
            createBtn.disabled = false; createBtn.textContent = 'Créer';
        });
    });

    function escHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
})();
</script>

</body>
</html>
