<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>deal-forge</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f8f9fa;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 48px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            text-align: center;
        }
        .logo {
            font-size: 32px;
            font-weight: 800;
            color: #1e293b;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }
        .logo span { color: #3b82f6; }
        .tagline {
            font-size: 15px;
            color: #64748b;
            margin-bottom: 32px;
        }
        .deals {
            text-align: left;
            margin-top: 24px;
        }
        .deals h3 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
            margin-bottom: 12px;
        }
        .deal-link {
            display: block;
            padding: 14px 16px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            margin-bottom: 8px;
            text-decoration: none;
            color: #1e293b;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .deal-link:hover {
            border-color: #3b82f6;
            box-shadow: 0 0 0 1px #3b82f6;
        }
        .deal-link .deal-status {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .deal-link .deal-status.draft {
            background: #fef3c7;
            color: #92400e;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">deal<span>-forge</span></div>
        <div class="tagline">Co-build specs & proposals with your clients.</div>
        <div class="deals">
            <h3>Active deals</h3>
            <a class="deal-link" href="/deals/draft/sales-cockpit-032026-v1-8d8c79">
                <span class="deal-status draft">draft</span>
                CDC Cockpit Sales — CarJager
            </a>
        </div>
    </div>
</body>
</html>
