<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>deal-forge — Connexion</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, system-ui, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: #2d2b35; background: #f4f3ee; line-height: 1.6;
            display: flex; align-items: center; justify-content: center; min-height: 100vh;
        }
        .auth-card {
            background: white; border-radius: 10px; padding: 36px;
            width: 400px; max-width: 90vw; box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .auth-logo {
            font-size: 15px; font-weight: 600; color: #8a8780; text-align: center; margin-bottom: 24px;
            letter-spacing: 0.02em;
        }
        .auth-card h2 { font-size: 20px; font-weight: 700; color: #2d2b35; margin-bottom: 4px; }
        .auth-card p { font-size: 13px; color: #8a8780; margin-bottom: 20px; }
        .auth-card label {
            font-size: 12px; font-weight: 600; color: #4a4850; display: block; margin-bottom: 4px;
        }
        .auth-card input {
            width: 100%; padding: 10px 14px; border: 1px solid #e8e6e0; border-radius: 8px;
            font-size: 13px; font-family: inherit; color: #2d2b35; outline: none;
            margin-bottom: 14px;
        }
        .auth-card input:focus { border-color: #c15f3c; box-shadow: 0 0 0 2px rgba(193,95,60,0.15); }
        .auth-card button {
            width: 100%; padding: 11px; background: #2d2b35; color: white;
            border: none; border-radius: 8px; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: background 0.15s; margin-top: 4px;
        }
        .auth-card button:hover { background: #3d3b45; }
        .auth-card button:disabled { opacity: 0.4; cursor: default; }
        .auth-toggle {
            text-align: center; margin-top: 16px; font-size: 13px; color: #8a8780;
        }
        .auth-toggle a {
            color: #c15f3c; text-decoration: none; font-weight: 500; cursor: pointer;
        }
        .auth-toggle a:hover { text-decoration: underline; }
        .auth-error {
            background: #fef2f2; color: #dc2626; font-size: 12px; padding: 8px 12px;
            border-radius: 6px; margin-bottom: 14px; display: none;
        }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="auth-logo">deal-forge</div>

    <!-- LOGIN FORM -->
    <div id="loginView">
        <h2>Connexion</h2>
        <p>Accédez à vos projets et devis.</p>
        <div class="auth-error" id="loginError"></div>
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="vous@exemple.com">
        <label>Mot de passe</label>
        <input type="password" id="loginPassword" placeholder="••••••••">
        <button id="loginBtn">Se connecter</button>
        <div class="auth-toggle">Pas encore de compte ? <a id="showSignup">Créer un compte</a></div>
    </div>

    <!-- SIGNUP FORM -->
    <div id="signupView" style="display:none;">
        <h2>Créer un compte</h2>
        <p>Commencez à structurer vos projets.</p>
        <div class="auth-error" id="signupError"></div>
        <label>Prénom</label>
        <input type="text" id="signupName" placeholder="Jean">
        <label>Nom de votre structure (optionnel)</label>
        <input type="text" id="signupCompany" placeholder="Studio XYZ">
        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="vous@exemple.com">
        <label>Mot de passe</label>
        <input type="password" id="signupPassword" placeholder="6 caractères minimum">
        <button id="signupBtn">Créer mon compte</button>
        <div class="auth-toggle">Déjà un compte ? <a id="showLogin">Se connecter</a></div>
    </div>
</div>

<script>
(function() {
    // If already logged in, redirect
    if (localStorage.getItem('df_token')) {
        window.location.href = '/deals/draft';
        return;
    }

    var loginView = document.getElementById('loginView');
    var signupView = document.getElementById('signupView');

    document.getElementById('showSignup').addEventListener('click', function() {
        loginView.style.display = 'none'; signupView.style.display = 'block';
    });
    document.getElementById('showLogin').addEventListener('click', function() {
        signupView.style.display = 'none'; loginView.style.display = 'block';
    });

    // LOGIN
    document.getElementById('loginBtn').addEventListener('click', doLogin);
    document.getElementById('loginPassword').addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });

    function doLogin() {
        var btn = document.getElementById('loginBtn');
        var err = document.getElementById('loginError');
        var email = document.getElementById('loginEmail').value.trim();
        var password = document.getElementById('loginPassword').value;
        if (!email || !password) { showErr(err, 'Remplissez tous les champs.'); return; }
        btn.disabled = true; btn.textContent = 'Connexion...'; err.style.display = 'none';

        fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email, password: password })
        }).then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
        .then(function(res) {
            if (!res.ok) { showErr(err, res.data.error || 'Erreur de connexion'); btn.disabled = false; btn.textContent = 'Se connecter'; return; }
            localStorage.setItem('df_token', res.data.token);
            localStorage.setItem('df_user', JSON.stringify(res.data.user));
            window.location.href = '/deals/draft';
        }).catch(function() { showErr(err, 'Erreur réseau'); btn.disabled = false; btn.textContent = 'Se connecter'; });
    }

    // SIGNUP
    document.getElementById('signupBtn').addEventListener('click', doSignup);
    document.getElementById('signupPassword').addEventListener('keydown', function(e) { if (e.key === 'Enter') doSignup(); });

    function doSignup() {
        var btn = document.getElementById('signupBtn');
        var err = document.getElementById('signupError');
        var name = document.getElementById('signupName').value.trim();
        var company = document.getElementById('signupCompany').value.trim();
        var email = document.getElementById('signupEmail').value.trim();
        var password = document.getElementById('signupPassword').value;
        if (!name || !email || !password) { showErr(err, 'Remplissez tous les champs obligatoires.'); return; }
        btn.disabled = true; btn.textContent = 'Création...'; err.style.display = 'none';

        fetch('/api/auth/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email, password: password, name: name, company: company })
        }).then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
        .then(function(res) {
            if (!res.ok) { showErr(err, res.data.error || 'Erreur'); btn.disabled = false; btn.textContent = 'Créer mon compte'; return; }
            localStorage.setItem('df_token', res.data.token);
            localStorage.setItem('df_user', JSON.stringify(res.data.user));
            window.location.href = '/deals/draft';
        }).catch(function() { showErr(err, 'Erreur réseau'); btn.disabled = false; btn.textContent = 'Créer mon compte'; });
    }

    function showErr(el, msg) { el.textContent = msg; el.style.display = 'block'; }
})();
</script>

</body>
</html>
