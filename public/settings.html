<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>deal-forge — Paramètres</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, system-ui, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: #2d2b35; background: #f4f3ee; line-height: 1.6;
        }
        .topbar {
            position: fixed; top: 0; left: 0; right: 0; height: 48px;
            background: white; border-bottom: 1px solid #e8e6e0;
            z-index: 300; display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px;
        }
        .topbar-left { display: flex; align-items: center; gap: 8px; }
        .topbar-btn {
            background: none; border: none; cursor: pointer; padding: 8px;
            border-radius: 6px; color: #6b6560; display: flex; align-items: center;
            justify-content: center; transition: all 0.15s; font-family: inherit; font-size: 13px;
        }
        .topbar-btn:hover { background: #edecea; color: #2d2b35; }
        .topbar-title { font-size: 13px; font-weight: 500; color: #6b6560; margin-left: 4px; }
        .topbar-right { display: flex; align-items: center; gap: 8px; }

        .main { padding: 68px 36px 36px; max-width: 640px; margin: 0 auto; }
        .main h1 { font-size: 22px; font-weight: 700; margin-bottom: 24px; }

        .section-card {
            background: white; border-radius: 10px; padding: 24px 28px;
            margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.07);
        }
        .section-card h2 { font-size: 15px; font-weight: 700; color: #2d2b35; margin-bottom: 16px; }
        .field { margin-bottom: 14px; }
        .field label { font-size: 12px; font-weight: 600; color: #4a4850; display: block; margin-bottom: 4px; }
        .field input {
            width: 100%; padding: 9px 12px; border: 1px solid #e8e6e0; border-radius: 8px;
            font-size: 13px; font-family: inherit; color: #2d2b35; outline: none;
        }
        .field input:focus { border-color: #c15f3c; box-shadow: 0 0 0 2px rgba(193,95,60,0.15); }
        .field-row { display: flex; gap: 12px; }
        .field-row .field { flex: 1; }
        .field .hint { font-size: 11px; color: #8a8780; margin-top: 3px; }

        .save-btn {
            padding: 10px 20px; background: #2d2b35; color: white;
            border: none; border-radius: 8px; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: background 0.15s;
        }
        .save-btn:hover { background: #3d3b45; }
        .save-btn:disabled { opacity: 0.4; }

        .save-status { font-size: 12px; color: #166534; margin-left: 12px; display: none; }

        .logout-btn {
            background: none; border: 1px solid #e8e6e0; border-radius: 8px;
            padding: 8px 16px; font-size: 13px; color: #6b6560; cursor: pointer;
            transition: all 0.15s; font-family: inherit;
        }
        .logout-btn:hover { background: #f4f3ee; color: #2d2b35; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-left">
        <a href="/deals/draft" class="topbar-btn" style="text-decoration:none;">← Projets</a>
        <span class="topbar-title">Paramètres</span>
    </div>
    <div class="topbar-right">
        <button class="logout-btn" id="logoutBtn">Déconnexion</button>
    </div>
</div>

<div class="main">
    <h1>Paramètres du compte</h1>

    <div class="section-card">
        <h2>Profil</h2>
        <div class="field">
            <label>Nom</label>
            <input type="text" id="userName">
        </div>
        <div class="field">
            <label>Email</label>
            <input type="email" id="userEmail" disabled style="background:#f9f8f6; cursor:default;">
        </div>
    </div>

    <div class="section-card">
        <h2>Structure</h2>
        <div class="field">
            <label>Nom commercial</label>
            <input type="text" id="accountName" placeholder="Studio XYZ">
        </div>
        <div class="field">
            <label>Raison sociale</label>
            <input type="text" id="legalName" placeholder="XYZ SAS">
        </div>
        <div class="field-row">
            <div class="field">
                <label>SIREN</label>
                <input type="text" id="siren" placeholder="123 456 789">
            </div>
            <div class="field">
                <label>TVA intracommunautaire</label>
                <input type="text" id="tvaIntra" placeholder="FR12345678901">
            </div>
        </div>
    </div>

    <div class="section-card">
        <h2>Paramètres devis</h2>
        <div class="field-row">
            <div class="field">
                <label>TJM par défaut (€ HT)</label>
                <input type="number" id="defaultTjm" placeholder="500">
                <div class="hint">Tarif journalier appliqué aux nouveaux projets</div>
            </div>
            <div class="field">
                <label>Capacité hebdo (J/H)</label>
                <input type="number" id="defaultCap" placeholder="3" step="0.5">
                <div class="hint">Jours disponibles par semaine sur un projet</div>
            </div>
        </div>
    </div>

    <div style="display:flex; align-items:center;">
        <button class="save-btn" id="saveBtn">Enregistrer</button>
        <span class="save-status" id="saveStatus">Enregistré</span>
    </div>
</div>

<script>
(function() {
    var token = localStorage.getItem('df_token');
    if (!token) { window.location.href = '/login'; return; }

    var headers = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };

    // Load profile
    fetch('/api/auth/me', { headers: headers })
        .then(function(r) { if (!r.ok) throw new Error(); return r.json(); })
        .then(function(data) {
            document.getElementById('userName').value = data.user.name || '';
            document.getElementById('userEmail').value = data.user.email || '';
            document.getElementById('accountName').value = data.account.name || '';
            document.getElementById('legalName').value = data.account.legal_name || '';
            document.getElementById('siren').value = data.account.siren || '';
            document.getElementById('tvaIntra').value = data.account.tva_intra || '';
            document.getElementById('defaultTjm').value = data.account.default_tjm || '';
            document.getElementById('defaultCap').value = data.account.default_weekly_cap || '';
        })
        .catch(function() {
            localStorage.removeItem('df_token');
            window.location.href = '/login';
        });

    // Save
    document.getElementById('saveBtn').addEventListener('click', function() {
        var btn = this;
        var status = document.getElementById('saveStatus');
        btn.disabled = true; btn.textContent = 'Enregistrement...';

        fetch('/api/auth/me', {
            method: 'PUT',
            headers: headers,
            body: JSON.stringify({
                name: document.getElementById('userName').value.trim(),
                account_name: document.getElementById('accountName').value.trim(),
                legal_name: document.getElementById('legalName').value.trim(),
                siren: document.getElementById('siren').value.trim(),
                tva_intra: document.getElementById('tvaIntra').value.trim(),
                default_tjm: parseFloat(document.getElementById('defaultTjm').value) || null,
                default_weekly_cap: parseFloat(document.getElementById('defaultCap').value) || null
            })
        }).then(function(r) {
            btn.disabled = false; btn.textContent = 'Enregistrer';
            if (r.ok) { status.style.display = 'inline'; setTimeout(function() { status.style.display = 'none'; }, 2500); }
        }).catch(function() { btn.disabled = false; btn.textContent = 'Enregistrer'; });
    });

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', function() {
        fetch('/api/auth/logout', { method: 'POST', headers: headers })
            .finally(function() {
                localStorage.removeItem('df_token');
                localStorage.removeItem('df_user');
                window.location.href = '/login';
            });
    });
})();
</script>

</body>
</html>
